<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>industriales.ai — Mapa del Éxito & Money Maker System</title>
<meta name="description" content="Plataforma de Mapa del Éxito y Money Maker System para empresarios industriales. Controla tu DSM, PDP, PEP y el seguimiento de actividades de tu equipo de ventas.">
<meta name="theme-color" content="#111111">
<meta property="og:type" content="website">
<meta property="og:url" content="https://mms.industriales.ai">
<meta property="og:title" content="industriales.ai — Mapa del Éxito & Money Maker System">
<meta property="og:description" content="Acceso a la plataforma de Mapa del Éxito y Money Maker System. Controla el potencial de tus plantas, el dinero sobre la mesa y el seguimiento de tu equipo comercial.">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="industriales.ai — Mapa del Éxito & Money Maker System">
<meta name="twitter:description" content="Plataforma de ventas industriales. Mapa del Éxito y Money Maker System.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23111111'/><text x='16' y='22' text-anchor='middle' font-size='20' font-family='Georgia,serif' fill='%23c9a84c'>i</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111111;
  --bg2:#1a1a1a;
  --bg3:#0d0d0d;
  --bg4:#222222;
  --text:#f0ede6;
  --text2:#9a9590;
  --text3:#5a5550;
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.14);
  --radius:8px;--radius-lg:12px;
  --gold:#c9a84c;
  --gold-light:#e8c97a;
  --gold-dark:#8a6d2a;
  --gold-bg:rgba(201,168,76,0.12);
  --gold-bg2:rgba(201,168,76,0.06);
  --blue:#378ADD;--blue-bg:rgba(55,138,221,0.12);
  --green:#639922;--green-bg:rgba(99,153,34,0.12);
  --amber:#c9a84c;--amber-bg:rgba(201,168,76,0.12);
  --red:#E24B4A;--red-bg:rgba(226,75,74,0.12);
  --gray:#6b6b6b;--gray-bg:rgba(255,255,255,0.06);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg3);min-height:100vh}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.auth-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:2rem;width:100%;max-width:380px}
.auth-logo{font-size:17px;font-weight:700;margin-bottom:2px;color:var(--gold)}
.auth-sub{font-size:12px;color:var(--text2);margin-bottom:1.5rem}
.auth-tabs{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:1.5rem}
.auth-tab{flex:1;padding:8px;font-size:13px;border:none;background:none;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px}
.auth-tab.active{color:var(--gold);font-weight:500;border-bottom:2px solid var(--gold)}
.auth-field{margin-bottom:12px}
.auth-field label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.auth-field input{width:100%;padding:8px 10px;font-size:13px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg3);color:var(--text)}
.auth-btn{width:100%;padding:9px;font-size:13px;font-weight:500;background:var(--gold);color:#111;border:none;border-radius:var(--radius);cursor:pointer;margin-top:6px;letter-spacing:.02em}
.auth-btn:hover{opacity:.85}
.auth-msg{font-size:12px;margin-top:10px;text-align:center;min-height:16px}
.err{color:var(--red)}.ok{color:var(--green)}
#app-screen{display:none;min-height:100vh}
.header-shell{background:var(--bg2);border-bottom:1px solid rgba(201,168,76,0.2);position:sticky;top:0;z-index:100}
.topbar{max-width:1100px;margin:0 auto;padding:0 1.25rem;display:flex;align-items:center;gap:12px;height:52px}
.topbar-logo{font-size:15px;font-weight:700;color:var(--gold);letter-spacing:-.2px}
.topbar-brand{flex:1;display:flex;flex-direction:column;justify-content:center}
.topbar-sub{font-size:10px;color:var(--gold-dark);margin-top:1px;letter-spacing:.01em}
.topbar-user{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.topbar-out{font-size:12px;padding:5px 14px;border:0.5px solid rgba(201,168,76,0.35);border-radius:var(--radius);background:transparent;cursor:pointer;color:var(--gold);white-space:nowrap;flex-shrink:0}
.topbar-out:hover{background:var(--gold-bg)}
.nav-shell{border-bottom:1px solid rgba(255,255,255,0.06)}
.nav{max-width:1100px;margin:0 auto;padding:0 1.25rem;display:flex;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:11px 18px;font-size:13px;border:none;background:none;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;flex-shrink:0;letter-spacing:.01em}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:var(--gold);font-weight:500;border-bottom:2px solid var(--gold)}
.main{padding:1.25rem;max-width:1100px;margin:0 auto;width:100%}
.page{display:none}.page.active{display:block}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.5rem}
.metric{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.metric-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.metric-value{font-size:20px;font-weight:500}
.metric-sub{font-size:11px;color:var(--text2);margin-top:2px}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.form-block{background:var(--bg3);border:0.5px solid rgba(201,168,76,0.18);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:8px 12px;font-size:11px;font-weight:500;color:var(--text2);background:var(--bg4);border-bottom:0.5px solid var(--border);white-space:nowrap}
thead th.r{text-align:right}
tbody tr{border-bottom:0.5px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody td{padding:8px 12px;vertical-align:middle}
tbody td.r{text-align:right}
tbody tr.trow{background:var(--bg4);font-weight:500}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b-verde{background:var(--green-bg);color:var(--green)}.b-amarillo{background:var(--amber-bg);color:var(--amber)}
.b-rojo{background:var(--red-bg);color:var(--red)}.b-azul{background:var(--blue-bg);color:var(--blue)}.b-gris{background:var(--gray-bg);color:var(--gray)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.d-v{background:#639922}.d-a{background:#EF9F27}.d-r{background:#E24B4A}.d-g{background:#888780}
label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}
input,select{font-size:13px;padding:7px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg3);color:var(--text);width:100%}
input,select option{background:var(--bg3);color:var(--text)}
input:focus,select:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:var(--gold-dark)}
.grid{display:grid;gap:10px;margin-bottom:10px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:1fr 1fr 1fr 1fr}
.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;padding:7px 16px;border:0.5px solid var(--border2);border-radius:var(--radius);background:transparent;cursor:pointer;color:var(--text)}
.btn:hover{background:var(--bg4)}.btn-primary{background:var(--gold);color:#111;border:none;font-weight:500}.btn-primary:hover{background:var(--gold-light)}
.btn-sm{padding:4px 10px;font-size:11px}.btn-danger{color:#e05555;border-color:rgba(224,85,85,0.3)}.btn-danger:hover{background:rgba(224,85,85,0.12)}
.flex-end{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
.flex-between{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1rem}
.kpi{background:var(--bg4);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 12px}
.kpi-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.kpi-value{font-size:15px;font-weight:500}
.prio-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:500}
.p1{background:var(--red-bg);color:var(--red)}.p2{background:var(--amber-bg);color:var(--amber)}.p3{background:var(--amber-bg);color:var(--amber)}.p4{background:var(--green-bg);color:var(--green)}.p5{background:var(--green-bg);color:var(--green)}
.empty{text-align:center;padding:2.5rem;color:var(--text3);font-size:13px}
.info-box{background:var(--gold-bg2);border-left:2px solid var(--gold-dark);border-radius:0 var(--radius) var(--radius) 0;padding:8px 12px;font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:1rem}
.section-label{font-size:11px;font-weight:500;color:var(--gold-dark);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.act-item{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:0.5px solid var(--border)}
.act-item:last-child{border-bottom:none}
.act-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.act-prog{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:var(--radius);background:var(--gold-bg2);border:0.5px solid var(--gold-dark);color:var(--text2);margin-top:4px}
.dg-hdr{font-size:11px;font-weight:500;color:var(--gold-dark);text-transform:uppercase;letter-spacing:.05em;padding:8px 0 4px;border-top:0.5px solid var(--border);margin-top:4px}
.dg-hdr:first-child{border-top:none;margin-top:0}
.fbar{display:flex;align-items:flex-end;gap:10px;padding:12px 14px;background:var(--bg4);border-radius:var(--radius-lg);margin-bottom:1rem}
.fbar input{width:140px}
.sb-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.sb-wnav{display:flex;align-items:center;gap:10px}
.sb-wlabel{font-size:13px;font-weight:500;min-width:180px;text-align:center}
.sb-wbtn{width:28px;height:28px;border-radius:50%;border:0.5px solid var(--border2);background:transparent;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text)}
.sb-wbtn:hover{background:var(--bg4)}
.sb-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:1.5rem}
.sb-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem}
.sb-nums{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sb-nbox{background:var(--bg4);border-radius:var(--radius);padding:8px 12px}
.sb-nlabel{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.sb-nval{font-size:22px;font-weight:500;color:var(--gold-light)}
.sb-ninput{font-size:22px;font-weight:500;border:none;background:transparent;color:var(--gold-light);width:100%;outline:none;padding:0}
.sb-ninput::placeholder{color:var(--text3);font-weight:400;font-size:18px}
.prog-wrap{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.prog-bar{height:100%;border-radius:3px;transition:width .3s}
.pct-lbl{font-size:11px;margin-top:4px;font-weight:500}
.auto-pill{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--gold-bg);color:var(--gold);font-weight:500}
.manual-pill{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--gray-bg);color:var(--gray);font-weight:500}
.sb-div{font-size:11px;font-weight:500;color:var(--gold);text-transform:uppercase;letter-spacing:.05em;margin:1.5rem 0 .75rem;display:flex;align-items:center;gap:8px}
.sb-div::after{content:'';flex:1;height:0.5px;background:var(--gold-dark)}
.sb-sum{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.sb-sumrow{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.sb-sumrow:last-child{border-bottom:none}
.hw{border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:8px;background:var(--bg2)}
.hw-hdr{padding:10px 14px;background:var(--bg4);font-size:12px;font-weight:500;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.hw-body{padding:10px 14px;display:none}
.hw-body.open{display:block}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:999;gap:10px;font-size:13px;color:var(--text2)}
@media(max-width:768px){
  .metrics{grid-template-columns:1fr 1fr}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .g2,.g3,.g4{grid-template-columns:1fr 1fr}
  .sb-grid{grid-template-columns:1fr}
  .topbar{padding:0 1rem;gap:8px;height:48px}
  .topbar-logo{font-size:14px}
  .topbar-sub{display:block}
  .topbar-user{max-width:100px;font-size:11px}
  .nav{padding:0 .75rem}
  .nav-btn{padding:10px 12px;font-size:12px}
  .main{padding:.75rem}
  .card{padding:.75rem 1rem}
  .form-block{padding:.75rem 1rem}
  .auth-card{padding:1.5rem 1.25rem}
  table{font-size:12px}
  thead th,tbody td{padding:6px 8px}
  .kpi{padding:8px 10px}
  .kpi-value{font-size:14px}
  .sb-card{padding:.75rem 1rem}
  .sb-nval,.sb-ninput{font-size:18px}
  .metric-value{font-size:17px}
  .fbar{flex-wrap:wrap}
  .fbar input{width:140px}
}
@media(max-width:480px){
  .metrics{grid-template-columns:1fr 1fr}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .g2,.g3,.g4{grid-template-columns:1fr}
  .topbar{height:auto;padding:.6rem 1rem;flex-wrap:nowrap}
  .topbar-logo{font-size:13px}
  .topbar-sub{font-size:9px}
  .topbar-user{display:none}
  .topbar-out{font-size:11px;padding:4px 10px}
  .nav-btn{padding:9px 10px;font-size:12px}
  .btn-sm{padding:4px 8px;font-size:11px}
  .flex-between{flex-direction:column;align-items:flex-start;gap:8px}
  .flex-end{flex-direction:column}
  .flex-end .btn{width:100%;justify-content:center}
  .sb-nums{grid-template-columns:1fr 1fr}
  .hw-hdr{font-size:11px}
  .main{padding:.6rem}
  .card,.form-block{padding:.6rem .75rem}
  table{font-size:11px}
  thead th,tbody td{padding:5px 6px}
}

.rol-btn{width:100%;padding:12px 8px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg3);color:var(--text);cursor:pointer;text-align:center;transition:border-color .15s,background .15s}
.rol-btn:hover{border-color:var(--gold-dark);background:var(--gold-bg2)}
.rol-btn.active{border:1.5px solid var(--gold);background:var(--gold-bg);color:var(--gold-light)}
</style>
</head>
<body>

<div id="auth-screen" style="display:flex;min-height:100vh;align-items:center;justify-content:center;padding:1rem">
  <div class="auth-card">
    <div class="auth-logo">industriales.ai</div>
    <div class="auth-sub">Plataforma de Mapa del Éxito y Money Maker System</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="authTab('login')">Iniciar sesión</button>
      <button class="auth-tab" onclick="authTab('signup')">Crear cuenta</button>
    </div>
    <div id="pane-login">
      <div class="auth-field"><label>Correo</label><input type="email" id="l-email" placeholder="tu@correo.com"></div>
      <div class="auth-field"><label>Contraseña</label><input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"></div>
      <button class="auth-btn" onclick="login()">Entrar</button>
    </div>
    <div id="pane-signup" style="display:none">
      <div class="auth-field"><label>Nombre completo</label><input type="text" id="s-name" placeholder="Tu nombre"></div>
      <div class="auth-field"><label>Correo</label><input type="email" id="s-email" placeholder="tu@correo.com"></div>
      <div class="auth-field"><label>Contraseña</label><input type="password" id="s-pass" placeholder="Mínimo 6 caracteres"></div>
      <div class="auth-field">
        <label>¿Cuál es tu rol?</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
          <button type="button" id="rol-dueno" class="rol-btn active" onclick="selectRol('dueno')">
            <div style="font-size:18px;margin-bottom:4px">🏢</div>
            <div style="font-size:13px;font-weight:500">Dueño</div>
            <div style="font-size:11px;opacity:.7;margin-top:2px">Creo mi empresa</div>
          </button>
          <button type="button" id="rol-vendedor" class="rol-btn" onclick="selectRol('vendedor')">
            <div style="font-size:18px;margin-bottom:4px">🤝</div>
            <div style="font-size:13px;font-weight:500">Vendedor</div>
            <div style="font-size:11px;opacity:.7;margin-top:2px">Me uno a un equipo</div>
          </button>
        </div>
      </div>
      <div id="campo-empresa-nueva" class="auth-field">
        <label>Nombre de tu empresa</label>
        <input type="text" id="s-empresa" placeholder="Ej: Soluciones Industriales SA">
      </div>
      <button class="auth-btn" onclick="signup()">Crear cuenta</button>
    </div>
    <div id="auth-msg" class="auth-msg"></div>
  </div>
</div>

<div class="overlay" id="overlay" style="display:none"><div class="spinner"></div><span>Cargando...</span></div>

<!-- PANTALLA: vendedor selecciona su organización -->
<div id="org-screen" style="display:none;min-height:100vh;background:var(--bg3);align-items:center;justify-content:center;padding:1rem">
  <div style="background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:2rem;width:100%;max-width:400px">
    <div style="font-size:17px;font-weight:700;color:var(--gold);margin-bottom:4px">industriales.ai</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:1.5rem">Selecciona la empresa a la que perteneces</div>
    <div style="margin-bottom:1rem">
      <label style="display:block;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">Empresa</label>
      <select id="org-select" style="width:100%;padding:8px 10px;font-size:13px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg3);color:var(--text)">
        <option value="">Cargando...</option>
      </select>
    </div>
    <button onclick="confirmarOrg()" style="width:100%;padding:9px;font-size:13px;font-weight:500;background:var(--gold);color:#111;border:none;border-radius:var(--radius);cursor:pointer">Unirme a esta empresa</button>
    <div id="org-msg" style="font-size:12px;color:var(--red);margin-top:10px;text-align:center;min-height:16px"></div>
    <button onclick="signout()" style="width:100%;margin-top:10px;padding:7px;font-size:12px;background:transparent;border:0.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;color:var(--text2)">Cerrar sesión</button>
  </div>
</div>

<div id="app-screen" style="display:none">
  <div class="header-shell">
    <div class="topbar">
      <div class="topbar-brand">
        <div class="topbar-logo">industriales.ai</div>
        <div class="topbar-sub">Mapa del Éxito &amp; Money Maker System</div>
      </div>
      <div class="topbar-user" id="tu"></div>
      <button class="topbar-out" onclick="signout()">Cerrar sesión</button>
    </div>
    <div class="nav-shell">
      <div class="nav">
        <button class="nav-btn active" onclick="go('mapa')">Mapa del Éxito</button>
        <button class="nav-btn" onclick="go('actividades')">Actividades</button>
        <button class="nav-btn" onclick="go('scoreboard')">Scoreboard</button>
        <button class="nav-btn" onclick="go('proyectos')">Proyectos</button>
        <button class="nav-btn" onclick="go('ranking')">Ranking</button>
      </div>
    </div>

function usDeEmp(eid){return D.usu.filter(u=>u.empresa_id===eid);}
function calcEmp(eid){
  // Only use non-knockout users for financial calculations
  const us=usDeEmp(eid).filter(u=>!u.es_knockout);
  const fT=us.reduce((a,u)=>a+(u.fact||0),0);
  const sC=us.reduce((a,u)=>a+(u.fact&&u.pct_rep?u.fact/u.pct_rep:0),0);
  const sP=us.reduce((a,u)=>a+(u.pct_planta||0),0);
  const pdp=sP>0?sC/sP:0;
  return{fT,sC,sP,pdp,dsm:pdp-fT,pep:pdp>0?fT/pdp:0};
}

function autoWeek(wk,uid){
  const d=new Date(wk+'T12:00:00');const f=new Date(d);f.setDate(d.getDate()+4);
  const fs=f.toISOString().split('T')[0];
  const inR=dt=>dt&&dt>=wk&&dt<=fs;
  const acts=uid?D.act.filter(a=>a.registrado_por===uid):D.act.filter(a=>a.registrado_por===ME.id);
  return{
    contactos:acts.filter(a=>inR(a.fecha)&&['contactado','intento'].includes(a.estado)).length,
    citas:acts.filter(a=>inR(a.fecha)&&a.estado==='cita_agendada').length,
    visitas:acts.filter(a=>{const u=a.fecha_prog||a.fecha;return inR(u)&&a.estado==='visita_realizada';}).length,
    cotizaciones:acts.filter(a=>inR(a.fecha)&&a.estado==='cotizacion').length,
    ordenes:acts.filter(a=>inR(a.fecha)&&a.estado==='orden').length,
    knockouts:acts.filter(a=>inR(a.fecha)&&a.estado==='knockout_agregado').length,
  };
}

function fmtMoneyInput(el){
  const raw=el.value.replace(/[^0-9]/g,'');
  if(!raw){el.value='';return;}
  el.value=parseInt(raw,10).toLocaleString('es-MX');
}

function getRawMoney(id){
  const v=document.getElementById(id)?.value||'';
  return parseFloat(v.replace(/[^0-9.]/g,''))||0;
}

function prevU(eid){
  const f=getRawMoney(`ufact-${eid}`);
  const p=parseFloat(document.getElementById(`uprep-${eid}`)?.value)||0;
  const prev=document.getElementById(`uprev-${eid}`);
  if(f>0&&p>0&&prev){
    const pct=p/100;
    const ct=f/pct,dsm=ct-f;
    prev.style.display='grid';
    document.getElementById(`uct-${eid}`).textContent=fmt(ct);
    document.getElementById(`udsm-${eid}`).textContent=fmt(dsm);
    document.getElementById(`u30-${eid}`).textContent=fmt(dsm*.3);
  }
}

async function guardarDatosKO(uid,eid){
  const fact=getRawMoney(`kofact-${uid}`);
  const pct_rep_pct=parseFloat(document.getElementById(`korep-${uid}`)?.value)||0;
  const pct_planta_pct=parseFloat(document.getElementById(`koplanta-${uid}`)?.value)||0;
  if(!fact)return alert('Ingresa la facturación actual');
  if(!pct_rep_pct||pct_rep_pct>100)return alert('Ingresa el % que representas');
  if(!pct_planta_pct||pct_planta_pct>100)return alert('Ingresa el % del total de la planta');
  load(true);
  const{error}=await db.from('usuarios').update({
    fact,pct_rep:pct_rep_pct/100,pct_planta:pct_planta_pct/100,es_knockout:false
  }).eq('id',uid);
  load(false);
  if(error)return alert(error.message);
  const u=D.usu.find(x=>x.id===uid);
  if(u){u.fact=fact;u.pct_rep=pct_rep_pct/100;u.pct_planta=pct_planta_pct/100;u.es_knockout=false;}
  // Registrar actividad automática
  const emp=D.emp.find(e=>e.id===eid);
  if(emp){
    const estadoAct=isKO?'knockout_agregado':'usuario_agregado';
    const notasAct=isKO?`Knockout agregado: ${nombre}${area?' ('+area+')':''}`:`Nuevo usuario registrado: ${nombre}${area?' ('+area+')':''}`;
    const{data:actData}=await db.from('actividades').insert({
      org_id:ORG.id,
      registrado_por:ME.id,
      registrado_nombre:MI_NOMBRE,
      empresa_id:eid,
      usuario_id:data.id,
      empresa_nombre:emp.nombre,
      usuario_nombre:nombre,
      estado:estadoAct,
      fecha:today(),
      notas:notasAct
    }).select().single();
    if(actData)D.act.unshift(actData);
  }

  document.getElementById(`uform-${eid}`).innerHTML='';
  rMapa();
}

function actHoy(){return today();}
function actLunes(){
  const d=new Date();const dw=d.getDay()||7;
  d.setDate(d.getDate()+(1-dw));
  return d.toISOString().split('T')[0];
}
function actMes(){
  const d=new Date();
  return new Date(d.getFullYear(),d.getMonth(),1).toISOString().split('T')[0];
}
function actFiltroRapido(tipo){
  let desde='',hasta='';
  if(tipo==='hoy'){desde=today();hasta=today();}
  else if(tipo==='ayer'){const d=new Date();d.setDate(d.getDate()-1);const s=d.toISOString().split('T')[0];desde=s;hasta=s;}
  else if(tipo==='semana'){desde=actLunes();hasta='';}
  else if(tipo==='2semanas'){const d=new Date();d.setDate(d.getDate()-13);desde=d.toISOString().split('T')[0];hasta='';}
  else if(tipo==='mes'){desde=actMes();hasta='';}
  // Store in module-level vars so rAct picks them up
  _actFD=desde;_actFH=hasta;
  rAct();
}

function updAU(){
  const eid=document.getElementById('ae')?.value;
  const us=D.usu.filter(u=>u.empresa_id===eid);
  const sel=document.getElementById('au');
  if(!us.length){sel.innerHTML='<option value="">Sin usuarios</option>';return;}
  sel.innerHTML=us.map(u=>`<option value="${u.id}">${u.nombre}${u.area?' — '+u.area:''}</option>`).join('');
}
async function saveAct(){
  const eid=document.getElementById('ae')?.value,uid=document.getElementById('au')?.value;
  if(!eid||!uid)return alert('Selecciona empresa y usuario');
  const emp=D.emp.find(e=>e.id===eid),usu=D.usu.find(u=>u.id===uid);
  load(true);
  const{data,error}=await db.from('actividades').insert({
    org_id:ORG.id,
    registrado_por:ME.id,
    registrado_nombre:MI_NOMBRE,
    empresa_id:eid,usuario_id:uid,
    empresa_nombre:emp.nombre,usuario_nombre:usu.nombre,
    estado:document.getElementById('aet')?.value,
    fecha:document.getElementById('af')?.value||today(),
    fecha_prog:document.getElementById('afp')?.value||null,
    notas:document.getElementById('an')?.value||''
  }).select().single();
  load(false);if(error)return alert(error.message);
  D.act.unshift(data);rAct();
}
async function delAct(id){
  if(!confirm('¿Eliminar esta actividad?'))return;
  load(true);await db.from('actividades').delete().eq('id',id);
  D.act=D.act.filter(a=>a.id!==id);load(false);rAct();
}

const AM=[
  {key:'contactos',label:'Contactos',icon:'📞',sub:'llamadas y mensajes'},
  {key:'citas',label:'Citas agendadas',icon:'📅',sub:'por fecha de registro'},
  {key:'visitas',label:'Visitas en planta',icon:'🏭',sub:'por fecha programada'},
  {key:'cotizaciones',label:'Cotizaciones',icon:'📄',sub:'por fecha de registro'},
  {key:'ordenes',label:'Órdenes de compra',icon:'✅',sub:'por fecha de registro'},
  {key:'knockouts',label:'Knockouts',icon:'🥊',sub:'usuarios knockout agregados esta semana'},
];
const MM=[
  {key:'power_knockouts',label:'Power knockouts',icon:'⚡',sub:'gerentes / supervisores nuevos'},
  {key:'facturacion',label:'Facturación',icon:'💰',sub:'monto facturado ($)',isMoney:true},
];
function sbKey2(uid){return wKey()+'_'+(uid||ME.id);}
function sbG(k,f,uid){const r=D.sb[sbKey2(uid||sbFiltroUid)];if(!r)return'';return r[`${k}_${f}`]||'';}
async function sbS(k,f,v){
  const wk=wKey();const sk=sbKey2(sbFiltroUid);const ex=D.sb[sk];const pl={[`${k}_${f}`]:parseFloat(v)||0};
  if(ex){await db.from('scoreboard').update(pl).eq('id',ex.id);D.sb[sk]={...ex,...pl};}
  else{const{data}=await db.from('scoreboard').insert({org_id:ORG.id,user_id:ME.id,week_key:wk,...pl}).select().single();if(data)D.sb[sk]=data;}
  rSBSum();
}

function rSB(){
  const el=document.getElementById('page-scoreboard');
  if(!sbFiltroUid)sbFiltroUid=ME.id;
  const k=wKey(),isNow=sbOff===0,auto=autoWeek(k,sbFiltroUid);
  const card=(m,isA)=>{
    const meta=parseFloat(sbG(m.key,'meta'))||0;
    const real=isA?auto[m.key]:(parseFloat(sbG(m.key,'real'))||0);
    const pN=meta>0?Math.round(real/meta*100):0;
    const pt=meta>0?Math.min(real/meta,1):0;
    const bc=pN>=100?'#639922':pN>=60?'#EF9F27':'#E24B4A';
    const tc=pN>=100?'var(--green)':pN>=60?'var(--amber)':'var(--red)';
    const pill=isA?`<span class="auto-pill">automático</span>`:`<span class="manual-pill">manual</span>`;
    const rv=isA?`<div class="sb-nval">${m.isMoney?fmt(real):real}</div>`
      :`<input class="sb-ninput" type="number" min="0" placeholder="—" value="${sbG(m.key,'real')}" ${isNow?'':'readonly style="opacity:.6"'} oninput="sbS('${m.key}','real',this.value)">`;
    return`<div class="sb-card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="font-size:18px">${m.icon}</span>
        <span style="font-size:13px;font-weight:500;flex:1">${m.label}</span>
        ${pill}${meta>0?`<span style="font-size:11px;font-weight:500;color:${tc}">${pN}%</span>`:''}
      </div>
      <div class="sb-nums">
        <div class="sb-nbox"><div class="sb-nlabel">Meta semanal</div>
          <input class="sb-ninput" type="number" min="0" placeholder="—" value="${sbG(m.key,'meta')}" ${isNow?'':'readonly style="opacity:.6"'} oninput="sbS('${m.key}','meta',this.value)">
        </div>
        <div class="sb-nbox"><div class="sb-nlabel">Resultado real</div>${rv}</div>
      </div>
      ${meta>0?`<div class="prog-wrap"><div class="prog-bar" style="width:${pt*100}%;background:${bc}"></div></div><div class="pct-lbl" style="color:${tc}">${pN}% de la meta${pN>=100?' ✓':''}</div>`:`<div style="font-size:11px;color:var(--text2);margin-top:4px">Define la meta para ver el progreso</div>`}
      <div style="font-size:11px;color:var(--text2);margin-top:6px">${m.sub}</div>
    </div>`;
  };
  const myUid=sbFiltroUid||ME.id;
  const pastK=[...new Set(Object.keys(D.sb).filter(x=>x.endsWith('_'+myUid)&&x.replace('_'+myUid,'')<k).map(x=>x.replace('_'+myUid,'')))].sort().reverse().slice(0,5);
  const hist=pastK.length===0?`<div class="empty" style="padding:1rem">Sin semanas anteriores.</div>`:
    pastK.map(wk=>{
      const aH=autoWeek(wk,sbFiltroUid||ME.id);const wkSk=wk+'_'+(sbFiltroUid||ME.id);const row=D.sb[wkSk]||{};
      const rows=[...AM,...MM].map(m=>{
        const iA=AM.find(x=>x.key===m.key);
        const meta=parseFloat(row[`${m.key}_meta`])||0;
        const real=iA?aH[m.key]:(parseFloat(row[`${m.key}_real`])||0);
        if(!meta&&!real)return'';
        const pN=meta>0?Math.round(real/meta*100):0;const c=pN>=100?'var(--green)':pN>=60?'var(--amber)':'var(--red)';
        return`<div class="sb-sumrow"><span style="font-size:14px;width:20px;text-align:center">${m.icon}</span><span style="flex:1">${m.label}</span><span style="font-size:12px;color:var(--text2);min-width:80px;text-align:right">${m.isMoney?fmt(real)+'/'+fmt(meta):real+'/'+meta}</span><span style="font-size:12px;font-weight:500;min-width:42px;text-align:right;color:${c}">${meta>0?pN+'%':'—'}</span></div>`;
      }).filter(Boolean).join('');
      return`<div class="hw"><div class="hw-hdr" onclick="this.nextElementSibling.classList.toggle('open')"><span>${wLabel(wk)}</span><span style="font-size:11px;color:var(--text2)">ver ↓</span></div><div class="hw-body">${rows||'Sin datos.'}</div></div>`;
    }).join('');
  const sbVendedorOpts=MI_ROL==='dueno'?`
    <div style="margin-bottom:1rem">
      <div class="section-label" style="margin-bottom:6px">Ver scoreboard de</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${MIEMBROS.map(m=>`<button class="btn btn-sm ${sbFiltroUid===(m.user_id)?' btn-primary':''}" onclick="sbFiltroUid='${m.user_id}';rSB()">${m.nombre}${m.rol==='dueno'?' (Dueño)':''}</button>`).join('')}
      </div>
    </div>`:'';
  el.innerHTML=`
  ${sbVendedorOpts}
  <div class="sb-header">
    <div><div style="font-size:15px;font-weight:500">Moneymaker Scoreboard</div><div style="font-size:12px;color:var(--text2);margin-top:2px">Lo que no se mide, no se controla</div></div>
    <div class="sb-wnav">
      <button class="sb-wbtn" onclick="sbOff--;rSB()">‹</button>
      <div class="sb-wlabel"><div>${isNow?'Semana actual':'Semana anterior'}</div><div style="font-size:11px;color:var(--text2);font-weight:400">${wLabel(k)}</div></div>
      <button class="sb-wbtn" onclick="if(sbOff<0){sbOff++;rSB()}" ${isNow?'style="opacity:.3;cursor:not-allowed"':''}>›</button>
    </div>
  </div>
  ${!isNow?`<div class="info-box">Semana anterior — solo lectura.</div>`:''}
  <div class="sb-div">Indicadores automáticos — de actividades</div>
  <div class="sb-grid">${AM.map(m=>card(m,true)).join('')}</div>
  <div class="sb-div">Indicadores manuales</div>
  <div class="sb-grid">${MM.map(m=>card(m,false)).join('')}</div>
  <div id="sbsum"></div>
  <div style="margin-top:1.5rem"><div class="section-label" style="margin-bottom:10px">Semanas anteriores</div>${hist}</div>`;
  rSBSum();
}
function rSBSum(){
  const el=document.getElementById('sbsum');if(!el)return;
  const k=wKey(),auto=autoWeek(k,sbFiltroUid||ME.id);
  const rows=[...AM,...MM].map(m=>{
    const iA=AM.find(x=>x.key===m.key);
    const meta=parseFloat(sbG(m.key,'meta'))||0;
    const real=iA?auto[m.key]:(parseFloat(sbG(m.key,'real'))||0);
    if(!meta&&!real)return'';
    const pN=meta>0?Math.round(real/meta*100):0;const c=pN>=100?'var(--green)':pN>=60?'var(--amber)':'var(--red)';
    return`<div class="sb-sumrow"><span style="font-size:14px;width:20px;text-align:center">${m.icon}</span><span style="flex:1">${m.label}</span><span style="font-size:12px;color:var(--text2);min-width:80px;text-align:right">${m.isMoney?fmt(real)+'/'+fmt(meta):real+'/'+meta}</span><span style="font-size:12px;font-weight:500;min-width:42px;text-align:right;color:${c}">${meta>0?pN+'%':'—'}</span></div>`;
  }).filter(Boolean).join('');
  el.innerHTML=rows?`<div class="sb-sum"><div style="font-size:12px;font-weight:500;margin-bottom:10px">Resumen de la semana</div>${rows}</div>`:'';
}


// ── PROYECTOS ──
const ETAPAS_PROY={
  analisis:   {label:'En análisis',     icon:'🔍', color:'#185FA5', bg:'rgba(55,138,221,0.12)'},
  cotizado:   {label:'Cotizado',        icon:'📄', color:'#854F0B', bg:'rgba(201,168,76,0.12)'},
  proceso_oc: {label:'En proceso de OC',icon:'⚙️', color:'#534AB7', bg:'rgba(83,74,183,0.12)'},
  cerrado:    {label:'Cerrado',         icon:'✅', color:'#3B6D11', bg:'rgba(99,153,34,0.12)'},
  perdido:    {label:'Perdido',         icon:'❌', color:'#A32D2D', bg:'rgba(226,75,74,0.12)'},
};

let proyFiltroEtapa='todos';
let proySelId=null;

function fmtMes(d){if(!d)return'';const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('es-MX',{month:'short',year:'numeric'});}
function mesKey(d){if(!d)return'';const dt=new Date(d+'T12:00:00');return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');}
function addMonths(n){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function mesLabel(key){const[y,m]=key.split('-');return new Date(parseInt(y),parseInt(m)-1,1).toLocaleDateString('es-MX',{month:'long',year:'numeric'});}

function renderProyectos(){
  if(proySelId){renderProyectoDetalle(proySelId);return;}
  const el=document.getElementById('page-proyectos');
  const proy=D.proy;
  const activos=proy.filter(p=>!['cerrado','perdido'].includes(p.etapa));
  const mes0=addMonths(0),mes1=addMonths(1),mes2=addMonths(2);
  const forecast=proy.filter(p=>p.etapa!=='perdido'&&p.etapa!=='cerrado'&&p.fecha_cierre);
  const f0=forecast.filter(p=>mesKey(p.fecha_cierre)===mes0).reduce((a,p)=>a+(p.valor_estimado||0),0);
  const f1=forecast.filter(p=>mesKey(p.fecha_cierre)===mes1).reduce((a,p)=>a+(p.valor_estimado||0),0);
  const f2=forecast.filter(p=>mesKey(p.fecha_cierre)===mes2).reduce((a,p)=>a+(p.valor_estimado||0),0);
  const fMax=Math.max(f0,f1,f2,1);
  const filtrados=proyFiltroEtapa==='todos'?proy:proy.filter(p=>p.etapa===proyFiltroEtapa);

  // Build cards
  let cards='';
  if(!filtrados.length){
    cards='<div class="empty">No hay proyectos'+(proyFiltroEtapa!=='todos'?' en esta etapa':'')+'.</div>';
  } else {
    filtrados.forEach(p=>{
      const et=ETAPAS_PROY[p.etapa]||ETAPAS_PROY.analisis;
      const com=(D.proy_com[p.id]||[]).length;
      let extra='';
      if(p.etapa==='perdido'&&p.razon_perdido) extra='<div style="font-size:12px;color:var(--red);margin-top:6px;padding:6px 10px;background:var(--red-bg);border-radius:var(--radius)">❌ '+p.razon_perdido+'</div>';
      cards+='<div class="card" style="cursor:pointer;margin-bottom:.75rem" onclick="proySelId=''+p.id+'';renderProyectos()">'
        +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px">'
        +'<div style="flex:1"><div style="font-size:14px;font-weight:500;color:var(--texto)">'+p.nombre+'</div>'
        +'<div style="font-size:12px;color:var(--text2);margin-top:2px">'+p.empresa_nombre+' · '+p.usuario_nombre+'</div></div>'
        +'<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;background:'+et.bg+';color:'+et.color+';flex-shrink:0">'+et.icon+' '+et.label+'</span>'
        +'</div>'
        +'<div style="display:flex;gap:16px;font-size:12px;color:var(--text2)">'
        +'<span>💰 '+fmt(p.valor_estimado)+'</span>'
        +(p.fecha_cierre?'<span>📅 Cierre: '+fd(p.fecha_cierre)+'</span>':'')
        +(com?'<span>💬 '+com+' comentario'+(com>1?'s':'')+'</span>':'')
        +'</div>'+extra+'</div>';
    });
  }

  // Build filter buttons
  let filterBtns='';
  ['todos','analisis','cotizado','proceso_oc','cerrado','perdido'].forEach(e=>{
    const lbl=e==='todos'?'Todos':ETAPAS_PROY[e].label;
    const active=proyFiltroEtapa===e;
    filterBtns+='<button class="btn btn-sm '+(active?'btn-primary':'')+'" onclick="proyFiltroEtapa=''+e+'';renderProyectos()">'+lbl+'</button>';
  });

  // Build forecast bars
  let forecastHTML='';
  [{k:mes0,v:f0},{k:mes1,v:f1},{k:mes2,v:f2}].forEach(({k,v})=>{
    const cnt=forecast.filter(p=>mesKey(p.fecha_cierre)===k).length;
    forecastHTML+='<div>'
      +'<div style="font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:capitalize">'+mesLabel(k)+'</div>'
      +'<div style="height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-bottom:4px">'
      +'<div style="height:100%;width:'+Math.round(v/fMax*100)+'%;background:var(--gold);border-radius:3px"></div></div>'
      +'<div style="font-size:15px;font-weight:500;color:'+(v>0?'var(--gold-light)':'var(--text3)')+'">'+fmt(v)+'</div>'
      +'<div style="font-size:11px;color:var(--text3)">'+cnt+' proyecto'+(cnt!==1?'s':'')+'</div>'
      +'</div>';
  });

  el.innerHTML=
    '<div class="metrics" style="grid-template-columns:repeat(3,minmax(0,1fr));margin-bottom:10px">'
    +'<div class="metric"><div class="metric-label">Proyectos activos</div><div class="metric-value">'+activos.length+'</div></div>'
    +'<div class="metric"><div class="metric-label">En análisis</div><div class="metric-value" style="color:var(--blue)">'+proy.filter(p=>p.etapa==='analisis').length+'</div></div>'
    +'<div class="metric"><div class="metric-label">Cotizados</div><div class="metric-value" style="color:var(--amber)">'+proy.filter(p=>p.etapa==='cotizado').length+'</div></div>'
    +'</div>'
    +'<div class="metrics" style="grid-template-columns:repeat(3,minmax(0,1fr));margin-bottom:1.5rem">'
    +'<div class="metric"><div class="metric-label">En proceso OC</div><div class="metric-value" style="color:#534AB7">'+proy.filter(p=>p.etapa==='proceso_oc').length+'</div></div>'
    +'<div class="metric"><div class="metric-label">Cerrados</div><div class="metric-value" style="color:var(--green)">'+proy.filter(p=>p.etapa==='cerrado').length+'</div></div>'
    +'<div class="metric"><div class="metric-label">Perdidos</div><div class="metric-value" style="color:var(--red)">'+proy.filter(p=>p.etapa==='perdido').length+'</div></div>'
    +'</div>'
    +'<div class="card" style="margin-bottom:1.5rem">'
    +'<div style="font-size:13px;font-weight:500;color:var(--gold);margin-bottom:12px">Forecast — próximos 3 meses</div>'
    +'<div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px">'+forecastHTML+'</div>'
    +'</div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap">'+filterBtns+'</div>'
    +'<button class="btn btn-primary" onclick="showFormProyecto()">+ Nuevo proyecto</button>'
    +'</div>'
    +'<div id="proy-form-container"></div>'
    +cards;
}

    +'<input id="pf-razon" value="'+(ex&&ex.razon_perdido?ex.razon_perdido:'')+'" placeholder="Ej: Precio no competitivo..."></div>'
    +'<div class="flex-end">'
    +'<button class="btn" onclick="document.getElementById('proy-form-container').innerHTML=''">Cancelar</button>'
    +'<button class="btn btn-primary" onclick="saveProyecto('+(editId?"'"+editId+"'":'null')+')">'+(ex?'Guardar cambios':'Crear proyecto')+'</button>'
    +'</div></div>';
  if(!ex&&D.emp.length)pfUpdUsuarios();
}

function pfToggleRazon(){
  const etapa=document.getElementById('pf-etapa')?.value;
  const wrap=document.getElementById('pf-razon-wrap');
  if(wrap)wrap.style.display=etapa==='perdido'?'block':'none';
}
function pfUpdUsuarios(){
  const eid=document.getElementById('pf-emp')?.value;
  const us=D.usu.filter(u=>u.empresa_id===eid&&!u.es_knockout);
  const sel=document.getElementById('pf-usu');
  if(!sel)return;
  if(!us.length){sel.innerHTML='<option value="">Sin usuarios activos</option>';return;}
  sel.innerHTML=us.map(u=>'<option value="'+u.id+'">'+u.nombre+(u.area?' — '+u.area:'')+'</option>').join('');
}

async function saveProyecto(editId){
  const nombre=document.getElementById('pf-nom')?.value.trim();
  if(!nombre)return alert('Escribe el nombre del proyecto');
  const eid=document.getElementById('pf-emp')?.value;
  const uid=document.getElementById('pf-usu')?.value;
  if(!eid||!uid)return alert('Selecciona empresa y usuario');
  const etapa=document.getElementById('pf-etapa')?.value;
  const razon=document.getElementById('pf-razon')?.value.trim()||'';
  if(etapa==='perdido'&&!razon)return alert('Escribe la razón por la que se perdió el proyecto');
  const emp=D.emp.find(e=>e.id===eid);
  const usu=D.usu.find(u=>u.id===uid);
  const val=getRawMoney('pf-val');
  const fecha=document.getElementById('pf-fecha')?.value||null;
  const desc=document.getElementById('pf-desc')?.value.trim()||'';
  load(true);
  if(editId){
    const{error}=await db.from('proyectos').update({
      empresa_id:eid,usuario_id:uid,empresa_nombre:emp.nombre,usuario_nombre:usu.nombre,
      nombre,descripcion:desc,valor_estimado:val,fecha_cierre:fecha,etapa,razon_perdido:razon||null
    }).eq('id',editId);
    load(false);
    if(error)return alert(error.message);
    const i=D.proy.findIndex(p=>p.id===editId);
    if(i>=0)D.proy[i]={...D.proy[i],empresa_id:eid,usuario_id:uid,empresa_nombre:emp.nombre,usuario_nombre:usu.nombre,nombre,descripcion:desc,valor_estimado:val,fecha_cierre:fecha,etapa,razon_perdido:razon||null};
    proySelId=editId;
  } else {
    const{data,error}=await db.from('proyectos').insert({
      org_id:ORG.id,empresa_id:eid,usuario_id:uid,empresa_nombre:emp.nombre,usuario_nombre:usu.nombre,
      nombre,descripcion:desc,valor_estimado:val,fecha_cierre:fecha,etapa,razon_perdido:razon||null,
      creado_por:ME.id,creado_nombre:MI_NOMBRE
    }).select().single();
    load(false);
    if(error)return alert(error.message);
    D.proy.unshift(data);
    proySelId=null;
  }
  document.getElementById('proy-form-container').innerHTML='';
  renderProyectos();
}

async function deleteProyecto(id){
  if(!confirm('¿Eliminar este proyecto?'))return;
  load(true);
  await db.from('proyectos').delete().eq('id',id);
  D.proy=D.proy.filter(p=>p.id!==id);
  delete D.proy_com[id];
  load(false);
  proySelId=null;
  renderProyectos();
}

async function renderProyectoDetalle(id){
  const el=document.getElementById('page-proyectos');
  const p=D.proy.find(x=>x.id===id);
  if(!p){proySelId=null;renderProyectos();return;}
  const et=ETAPAS_PROY[p.etapa]||ETAPAS_PROY.analisis;
  if(!D.proy_com[id]){
    const{data}=await db.from('proyecto_comentarios').select('*').eq('proyecto_id',id).order('created_at');
    D.proy_com[id]=data||[];
  }
  const coms=D.proy_com[id];

  // Timeline
  const etapasOrd=['analisis','cotizado','proceso_oc','cerrado'];
  let timelineHTML='';
  etapasOrd.forEach((e,i)=>{
    const et2=ETAPAS_PROY[e];
    const curIdx=etapasOrd.indexOf(p.etapa);
    const done=curIdx>=i&&p.etapa!=='perdido';
    const active=p.etapa===e;
    if(i>0)timelineHTML+='<div style="flex:0 0 20px;height:1px;background:var(--border);margin-top:14px"></div>';
    timelineHTML+='<div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:4px">'
      +'<div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;'
      +'background:'+(active?et2.bg:done?'rgba(99,153,34,0.15)':'var(--bg4)')+';"'
      +' style2="border:1.5px solid '+(active?et2.color:done?'#639922':'var(--border2)')+';">'
      +(done&&!active?'✓':et2.icon)
      +'</div>'
      +'<div style="font-size:10px;text-align:center;color:'+(active?et2.color:done?'var(--text2)':'var(--text3)')+';line-height:1.3">'+et2.label+'</div>'
      +'</div>';
  });

  // Comments
  let comsHTML='';
  if(!coms.length){
    comsHTML='<div style="font-size:13px;color:var(--text3);padding:.5rem 0">Sin comentarios aún.</div>';
  } else {
    coms.forEach(c=>{
      comsHTML+='<div style="padding:10px 0;border-bottom:0.5px solid var(--border)">'
        +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'
        +'<span style="font-size:12px;font-weight:500;color:var(--texto)">'+c.autor_nombre+'</span>'
        +'<span style="font-size:11px;color:var(--text3)">'+fd((c.created_at||'').split('T')[0])+'</span>'
        +'</div>'
        +'<div style="font-size:13px;color:var(--text2);line-height:1.6">'+c.contenido+'</div>'
        +'</div>';
    });
  }

  el.innerHTML=
    '<div style="margin-bottom:1rem"><button class="btn btn-sm" onclick="proySelId=null;renderProyectos()">← Volver a proyectos</button></div>'
    +'<div class="card" style="margin-bottom:1rem">'
    +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap">'
    +'<div><div style="font-size:17px;font-weight:500;color:var(--texto)">'+p.nombre+'</div>'
    +'<div style="font-size:13px;color:var(--text2);margin-top:3px">'+p.empresa_nombre+' · '+p.usuario_nombre+'</div></div>'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap">'
    +'<button class="btn btn-sm" onclick="showFormProyecto(''+p.id+'')">Editar</button>'
    +'<button class="btn btn-sm btn-danger" onclick="deleteProyecto(''+p.id+'')">Eliminar</button>'
    +'</div></div>'
    +'<div style="display:flex;align-items:flex-start;gap:0;margin-bottom:14px;padding:12px;background:var(--bg3);border-radius:var(--radius)">'
    +(p.etapa==='perdido'
      ?'<div style="width:100%;text-align:center;padding:4px 0"><span style="display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;background:var(--red-bg);color:var(--red);font-weight:500;font-size:13px">❌ Proyecto Perdido</span></div>'
      :timelineHTML)
    +'</div>'
    +(p.etapa==='perdido'&&p.razon_perdido?'<div style="font-size:13px;color:var(--red);padding:8px 12px;background:var(--red-bg);border-radius:var(--radius);margin-bottom:12px">Razón: '+p.razon_perdido+'</div>':'')
    +'<div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:'+(p.descripcion?'12px':'0')+'">'
    +'<div class="kpi"><div class="kpi-label">Valor estimado</div><div class="kpi-value" style="color:var(--gold)">'+fmt(p.valor_estimado)+'</div></div>'
    +'<div class="kpi"><div class="kpi-label">Fecha de cierre</div><div class="kpi-value" style="font-size:14px">'+(p.fecha_cierre?fd(p.fecha_cierre):'—')+'</div></div>'
    +'<div class="kpi"><div class="kpi-label">Creado por</div><div class="kpi-value" style="font-size:13px">'+p.creado_nombre+'</div></div>'
    +'</div>'
    +(p.descripcion?'<div style="font-size:13px;color:var(--text2);line-height:1.65;padding-top:10px;border-top:0.5px solid var(--border)">'+p.descripcion+'</div>':'')
    +'</div>'
    +'<div class="card">'
    +'<div style="font-size:13px;font-weight:500;color:var(--gold);margin-bottom:12px">Bitácora de comentarios</div>'
    +'<div style="margin-bottom:12px">'
    +'<textarea id="nuevo-com-'+id+'" placeholder="Agrega un comentario, detalle o avance importante..." '
    +'style="width:100%;padding:8px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg3);color:var(--texto);font-size:13px;min-height:70px;resize:vertical;font-family:inherit"></textarea>'
    +'<div style="display:flex;justify-content:flex-end;margin-top:6px">'
    +'<button class="btn btn-primary btn-sm" onclick="agregarComentario(''+id+'')">Agregar comentario</button>'
    +'</div></div>'
    +'<div>'+comsHTML+'</div>'
    +'</div>';
}

async function agregarComentario(proyId){
  const ta=document.getElementById('nuevo-com-'+proyId);
  const texto=ta?.value.trim();
  if(!texto)return alert('Escribe un comentario');
  load(true);
  const{data,error}=await db.from('proyecto_comentarios').insert({
    proyecto_id:proyId,org_id:ORG.id,autor_id:ME.id,autor_nombre:MI_NOMBRE,contenido:texto
  }).select().single();
  load(false);
  if(error)return alert(error.message);
  if(!D.proy_com[proyId])D.proy_com[proyId]=[];
  D.proy_com[proyId].push(data);
  ta.value='';
  renderProyectoDetalle(proyId);
}


// ── RANKING ──
function rRank(){
  const el=document.getElementById('page-ranking');
  const data=D.emp.map(e=>({...e,...calcEmp(e.id)})).sort((a,b)=>(a.pep||1)-(b.pep||1));
  const rows=!data.length?`<tr><td colspan="6" class="empty">Sin empresas aún</td></tr>`:
    data.map(e=>{
      const pr=prio(e.pep||0),acts=D.act.filter(a=>a.empresa_id===e.id).length;
      return`<tr><td><div style="display:flex;align-items:center;gap:8px"><span class="prio-badge ${pr.c}">${pr.n}</span><span style="font-weight:500">${e.nombre}</span></div></td><td class="r">${fmt(e.pdp)}</td><td class="r" style="color:var(--blue);font-weight:500">${fmt(e.dsm)}</td><td class="r">${pf(e.pep)}</td><td class="r">${usDeEmp(e.id).length}</td><td class="r"><span class="badge b-gris">${acts}</span></td></tr>`;
    }).join('');
  el.innerHTML=`
  <div class="info-box">Entre más bajo el PEP, más dinero existe que aún no estás capturando. Prioridad 1 = 0–20%.</div>
  <div class="card" style="padding:0;overflow:hidden;margin-bottom:1rem">
    <table><thead><tr><th>Empresa</th><th class="r">PDP</th><th class="r">DSM</th><th class="r">PEP</th><th class="r">Usuarios</th><th class="r">Actividades</th></tr></thead>
    <tbody>${rows}</tbody></table>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <span class="badge p1">P1 — 0% a 20%</span><span class="badge p2">P2 — 21% a 40%</span>
    <span class="badge p3" style="background:var(--amber-bg);color:var(--amber)">P3 — 41% a 60%</span>
    <span class="badge p4">P4 — 61% a 80%</span><span class="badge p5">P5 — 81% a 100%</span>
  </div>`;
}
</script>
